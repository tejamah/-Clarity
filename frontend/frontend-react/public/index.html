<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Summarized News</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3f0ea;
        --paper: #fffdf7;
        --ink: #171717;
        --muted: #68645d;
        --line: #ded7ca;
        --accent: #e5484d;
        --accent-strong: #b4232a;
        --blue: #2662d9;
        --green: #0d7a5f;
        --gold: #b7791f;
        --shadow: 0 22px 60px rgba(28, 25, 23, 0.13);
        --warn: #a34112;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          linear-gradient(135deg, rgba(229, 72, 77, 0.08), transparent 34%),
          linear-gradient(225deg, rgba(38, 98, 217, 0.09), transparent 34%),
          var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      header {
        border-bottom: 1px solid rgba(23, 23, 23, 0.1);
        background: rgba(255, 253, 247, 0.86);
        position: sticky;
        top: 0;
        z-index: 10;
        backdrop-filter: blur(18px) saturate(1.2);
      }

      .topbar {
        width: min(1280px, calc(100% - 32px));
        margin: 0 auto;
        padding: 20px 0 16px;
      }

      .title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .brand {
        align-items: center;
        display: flex;
        gap: 12px;
        min-width: 0;
      }

      .mark {
        align-items: center;
        background: var(--ink);
        border-radius: 8px;
        color: var(--paper);
        display: grid;
        flex: 0 0 44px;
        font-weight: 900;
        height: 44px;
        place-items: center;
        width: 44px;
      }

      h1 {
        margin: 0;
        font-size: clamp(1.55rem, 3vw, 2.35rem);
        letter-spacing: 0;
        line-height: 0.95;
      }

      .deck {
        color: var(--muted);
        font-size: 0.9rem;
        font-weight: 650;
        margin-top: 6px;
      }

      .status {
        align-items: center;
        background: #ffffff;
        border: 1px solid var(--line);
        border-radius: 999px;
        box-shadow: 0 8px 24px rgba(23, 23, 23, 0.06);
        color: var(--ink);
        display: flex;
        font-size: 0.92rem;
        font-weight: 750;
        gap: 8px;
        padding: 9px 13px;
        white-space: nowrap;
      }

      .status::before {
        background: var(--green);
        border-radius: 50%;
        box-shadow: 0 0 0 5px rgba(13, 122, 95, 0.13);
        content: "";
        height: 8px;
        width: 8px;
      }

      .actions {
        align-items: center;
        display: flex;
        gap: 10px;
      }

      .auth-toggle,
      .auth-submit,
      .logout {
        border: 1px solid rgba(23, 23, 23, 0.14);
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
        font-size: 0.9rem;
        font-weight: 850;
        padding: 9px 13px;
      }

      .auth-toggle,
      .logout {
        background: var(--ink);
        color: #fff;
      }

      .auth-panel {
        background: rgba(255, 253, 247, 0.94);
        border: 1px solid rgba(23, 23, 23, 0.11);
        border-radius: 8px;
        box-shadow: var(--shadow);
        display: none;
        margin-bottom: 14px;
        padding: 14px;
      }

      .auth-panel.open {
        display: block;
      }

      .auth-form {
        align-items: center;
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto auto;
        gap: 10px;
      }

      .auth-form.login-mode .name-field {
        display: none;
      }

      .auth-form input {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
        font-weight: 650;
        min-width: 0;
        padding: 11px 12px;
      }

      .auth-submit {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }

      .mode-switch {
        background: transparent;
        border: 0;
        color: var(--blue);
        cursor: pointer;
        font: inherit;
        font-weight: 850;
        padding: 8px;
      }

      .auth-message {
        color: var(--warn);
        font-size: 0.9rem;
        font-weight: 750;
        margin-top: 10px;
        min-height: 1.2em;
      }

      .user-chip {
        align-items: center;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        display: none;
        font-size: 0.9rem;
        font-weight: 850;
        gap: 8px;
        padding: 8px 12px;
      }

      .user-chip.visible {
        display: inline-flex;
      }

      .user-chip::before {
        background: var(--blue);
        border-radius: 50%;
        color: #fff;
        content: attr(data-initial);
        display: grid;
        font-size: 0.75rem;
        height: 22px;
        place-items: center;
        width: 22px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        padding-bottom: 4px;
        scrollbar-width: thin;
      }

      .tab {
        border: 1px solid rgba(23, 23, 23, 0.12);
        background: rgba(255, 255, 255, 0.72);
        color: var(--ink);
        border-radius: 999px;
        cursor: pointer;
        font: inherit;
        font-size: 0.93rem;
        font-weight: 800;
        padding: 10px 15px;
        text-transform: capitalize;
        transition:
          background 160ms ease,
          border-color 160ms ease,
          color 160ms ease,
          transform 160ms ease;
      }

      .tab:hover {
        border-color: rgba(23, 23, 23, 0.26);
        transform: translateY(-1px);
      }

      .tab.active {
        background: var(--ink);
        border-color: var(--ink);
        color: white;
      }

      main {
        width: min(1280px, calc(100% - 32px));
        margin: 28px auto 64px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 18px;
      }

      article {
        background: rgba(255, 253, 247, 0.94);
        border: 1px solid rgba(23, 23, 23, 0.1);
        border-radius: 8px;
        box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8);
        display: flex;
        grid-column: span 4;
        min-height: 360px;
        overflow: hidden;
        flex-direction: column;
        transition:
          box-shadow 180ms ease,
          transform 180ms ease,
          border-color 180ms ease;
      }

      article:hover {
        border-color: rgba(23, 23, 23, 0.22);
        box-shadow: var(--shadow);
        transform: translateY(-3px);
      }

      article:nth-child(1),
      article:nth-child(2) {
        grid-column: span 6;
      }

      article:nth-child(1) h2,
      article:nth-child(2) h2 {
        font-size: clamp(1.45rem, 2.2vw, 2.1rem);
      }

      .thumb {
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #dfd8cc;
        object-fit: cover;
      }

      .placeholder {
        align-items: end;
        aspect-ratio: 16 / 10;
        background:
          linear-gradient(135deg, rgba(229, 72, 77, 0.92), rgba(38, 98, 217, 0.86)),
          #1f2937;
        color: #fff;
        display: flex;
        font-size: 0.78rem;
        font-weight: 900;
        justify-content: space-between;
        letter-spacing: 0;
        padding: 14px;
        text-transform: uppercase;
      }

      .placeholder span:last-child {
        border: 1px solid rgba(255, 255, 255, 0.55);
        border-radius: 999px;
        padding: 5px 8px;
      }

      .content {
        padding: 18px;
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 12px;
      }

      .meta {
        color: var(--muted);
        display: flex;
        flex-wrap: wrap;
        gap: 9px;
        font-size: 0.78rem;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h2 {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 1.22rem;
        line-height: 1.12;
        margin: 0;
      }

      p {
        color: #403d39;
        font-size: 0.98rem;
        line-height: 1.5;
        margin: 0;
      }

      a {
        align-items: center;
        color: var(--accent-strong);
        display: inline-flex;
        font-weight: 800;
        gap: 8px;
        margin-top: auto;
        text-decoration: none;
      }

      a::after {
        content: "->";
        transition: transform 160ms ease;
      }

      a:hover {
        color: var(--blue);
      }

      a:hover::after {
        transform: translateX(3px);
      }

      .empty,
      .error {
        border: 1px solid var(--line);
        background: var(--paper);
        border-radius: 8px;
        grid-column: 1 / -1;
        padding: 22px;
      }

      .error {
        border-color: #fed7aa;
        color: var(--warn);
      }

      @media (max-width: 640px) {
        .title-row {
          align-items: start;
          flex-direction: column;
        }

        .status {
          white-space: normal;
        }

        .actions {
          align-items: stretch;
          flex-wrap: wrap;
          width: 100%;
        }

        .auth-form {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 980px) {
        article,
        article:nth-child(1),
        article:nth-child(2) {
          grid-column: span 6;
        }
      }

      @media (max-width: 700px) {
        .grid {
          grid-template-columns: 1fr;
        }

        article,
        article:nth-child(1),
        article:nth-child(2) {
          grid-column: 1;
        }

        article:nth-child(1) h2,
        article:nth-child(2) h2 {
          font-size: 1.35rem;
        }

        .mark {
          height: 40px;
          width: 40px;
          flex-basis: 40px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="topbar">
        <div class="title-row">
          <div class="brand">
            <div class="mark">LN</div>
            <div>
              <h1>Live Summarized News</h1>
              <div class="deck">Fast free feeds, clean summaries, endless scroll.</div>
            </div>
          </div>
          <div class="actions">
            <div class="status" id="status">Live updating</div>
            <div class="user-chip" id="userChip" data-initial=""></div>
            <button class="auth-toggle" id="authToggle" type="button">Sign in</button>
            <button class="logout" id="logoutButton" type="button" hidden>Logout</button>
          </div>
        </div>
        <section class="auth-panel" id="authPanel" aria-label="User account">
          <form class="auth-form login-mode" id="authForm">
            <input class="name-field" id="nameInput" name="name" autocomplete="name" placeholder="Name" />
            <input id="emailInput" name="email" autocomplete="email" placeholder="Email" type="email" required />
            <input
              id="passwordInput"
              name="password"
              autocomplete="current-password"
              minlength="8"
              placeholder="Password"
              type="password"
              required
            />
            <button class="auth-submit" id="authSubmit" type="submit">Sign in</button>
            <button class="mode-switch" id="modeSwitch" type="button">Create account</button>
          </form>
          <div class="auth-message" id="authMessage"></div>
        </section>
        <nav class="tabs" id="tabs" aria-label="News categories"></nav>
      </div>
    </header>

    <main>
      <section class="grid" id="news"></section>
    </main>

    <script>
      const state = {
        active: "top",
        categories: ["top", "technology", "business", "sports", "entertainment"],
        articles: {},
        authMode: "login",
        updatedAt: null,
        user: null,
      };

      const tabs = document.querySelector("#tabs");
      const news = document.querySelector("#news");
      const status = document.querySelector("#status");
      const authToggle = document.querySelector("#authToggle");
      const authPanel = document.querySelector("#authPanel");
      const authForm = document.querySelector("#authForm");
      const authSubmit = document.querySelector("#authSubmit");
      const modeSwitch = document.querySelector("#modeSwitch");
      const authMessage = document.querySelector("#authMessage");
      const logoutButton = document.querySelector("#logoutButton");
      const userChip = document.querySelector("#userChip");
      const nameInput = document.querySelector("#nameInput");
      const emailInput = document.querySelector("#emailInput");
      const passwordInput = document.querySelector("#passwordInput");

      function formatCategory(category) {
        return category.replaceAll("-", " ");
      }

      function setStatus(text) {
        status.textContent = text;
      }

      function sourceInitials(source = "news") {
        return source
          .replace(/^www\./, "")
          .split(/[.\s-]+/)
          .filter(Boolean)
          .slice(0, 2)
          .map((part) => part[0])
          .join("")
          .toUpperCase();
      }

      function userInitial(name = "") {
        return (name.trim()[0] || "U").toUpperCase();
      }

      function setAuthMessage(message = "") {
        authMessage.textContent = message;
      }

      function setAuthMode(mode) {
        state.authMode = mode;
        const isRegister = mode === "register";
        authForm.classList.toggle("login-mode", !isRegister);
        nameInput.required = isRegister;
        passwordInput.autocomplete = isRegister ? "new-password" : "current-password";
        authSubmit.textContent = isRegister ? "Create" : "Sign in";
        modeSwitch.textContent = isRegister ? "Use sign in" : "Create account";
        setAuthMessage("");
      }

      function renderAuth() {
        const user = state.user;
        userChip.classList.toggle("visible", Boolean(user));
        logoutButton.hidden = !user;
        authToggle.hidden = Boolean(user);

        if (user) {
          userChip.dataset.initial = userInitial(user.name);
          userChip.textContent = user.name;
          authPanel.classList.remove("open");
        } else {
          userChip.dataset.initial = "";
          userChip.textContent = "";
        }
      }

      async function authRequest(path, body) {
        const response = await fetch(path, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.error || "Account request failed.");
        }
        return payload;
      }

      function renderTabs() {
        tabs.innerHTML = "";
        state.categories.forEach((category) => {
          const button = document.createElement("button");
          button.className = `tab${category === state.active ? " active" : ""}`;
          button.type = "button";
          button.textContent = formatCategory(category);
          button.addEventListener("click", () => {
            state.active = category;
            render();
          });
          tabs.append(button);
        });
      }

      function articleCard(article) {
        const card = document.createElement("article");

        if (article.image) {
          const image = document.createElement("img");
          image.className = "thumb";
          image.src = article.image;
          image.alt = "";
          image.loading = "lazy";
          image.addEventListener("error", () => {
            image.replaceWith(placeholderBlock(article));
          });
          card.append(image);
        } else {
          card.append(placeholderBlock(article));
        }

        const content = document.createElement("div");
        content.className = "content";

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = [article.source, article.published].filter(Boolean).join(" - ");

        const title = document.createElement("h2");
        title.textContent = article.title;

        const summary = document.createElement("p");
        summary.textContent = article.summary || "Summary unavailable for this story.";

        const link = document.createElement("a");
        link.href = article.url;
        link.target = "_blank";
        link.rel = "noreferrer";
        link.textContent = "Read story";

        content.append(meta, title, summary, link);
        card.append(content);
        return card;
      }

      function placeholderBlock(article) {
        const placeholder = document.createElement("div");
        placeholder.className = "placeholder";

        const label = document.createElement("span");
        label.textContent = formatCategory(state.active);

        const initials = document.createElement("span");
        initials.textContent = sourceInitials(article.source);

        placeholder.append(label, initials);
        return placeholder;
      }

      function renderNews() {
        const articles = state.articles[state.active] || [];
        news.innerHTML = "";
        setStatus("Live updating");

        if (!articles.length) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "No stories loaded for this category yet. Fresh stories are loading now.";
          news.append(empty);
          return;
        }

        articles.forEach((article) => news.append(articleCard(article)));
      }

      function render() {
        renderTabs();
        renderNews();
      }

      function applyPayload(payload) {
        state.categories = payload.categories || state.categories;
        state.articles = payload.articles || {};
        state.updatedAt = payload.updated_at;

        if (!state.categories.includes(state.active)) {
          state.active = state.categories[0] || "top";
        }

        render();
      }

      async function loadNews() {
        try {
          const response = await fetch("/api/news");
          if (!response.ok) {
            throw new Error(`Backend returned ${response.status}`);
          }
          applyPayload(await response.json());
        } catch (error) {
          news.innerHTML = `<div class="error">Could not load news: ${error.message}</div>`;
          setStatus("Offline");
        }
      }

      async function loadUser() {
        try {
          const response = await fetch("/api/auth/me");
          const payload = await response.json();
          state.user = payload.user;
          renderAuth();
        } catch (error) {
          state.user = null;
          renderAuth();
        }
      }

      authToggle.addEventListener("click", () => {
        authPanel.classList.toggle("open");
        setAuthMessage("");
      });

      modeSwitch.addEventListener("click", () => {
        setAuthMode(state.authMode === "login" ? "register" : "login");
      });

      authForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        setAuthMessage("");

        const body = {
          email: emailInput.value,
          password: passwordInput.value,
        };
        if (state.authMode === "register") {
          body.name = nameInput.value;
        }

        try {
          const payload = await authRequest(`/api/auth/${state.authMode}`, body);
          state.user = payload.user;
          authForm.reset();
          renderAuth();
        } catch (error) {
          setAuthMessage(error.message);
        }
      });

      logoutButton.addEventListener("click", async () => {
        try {
          const payload = await authRequest("/api/auth/logout", {});
          state.user = payload.user;
          renderAuth();
        } catch (error) {
          setAuthMessage(error.message);
        }
      });

      setAuthMode("login");
      loadUser();
      render();
      loadNews();

      setInterval(loadNews, 15000);
    </script>
  </body>
</html>
